# ============================================================================
# LongBench — Ours (flash-attn backend)
# ============================================================================
# Windowed KV-cache with flash-attention-2 score extraction.
# DefensiveKV headline: compression_ratio=0.8 (cache_budget=0.20).
# Produces: outputs/longbench/ours_flash_attn_compression_0.8/
_base_: base.yaml

run:
  mode: longbench
  seed: 42

model:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  revision: main
  dtype: float16
  attn_implementation: flash_attention_2     # MUST match cache.backend_package

cache:
  backend: windowed
  backend_package: flash_attn               # imports modules.windowed_cache
  cache_budget: 0.20                        # DefensiveKV's headline; compression_ratio = 0.8
  window_size: 32
  num_sink_tokens: 4
  local_window_size: 0.25                   # ratio of post-sink region
  obs_window: 32

telemetry:
  track_scores: false                       # mandatory; see prompt 04 §1

longbench:
  datasets:
    - narrativeqa
    - qasper
    - multifieldqa_en
    - hotpotqa
    - 2wikimqa
    - musique
    - gov_report
    - qmsum
    - multi_news
    - trec
    - triviaqa
    - samsum
    - passage_count
    - passage_retrieval_en
    - lcc
    - repobench-p
  include_chinese: false
  use_e_variants: false
  max_length: 7500
  output_dir: outputs/longbench/ours_flash_attn_compression_0.8
  seed: 42
  resume: false
  skip_oom: false
  aggressive_cache_clear: false
