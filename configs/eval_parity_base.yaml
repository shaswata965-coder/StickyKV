# ============================================================================
# StickyKV — Parity Base Configuration (Suite A — vanilla model)
# ============================================================================
_base_: base.yaml

run:
  mode: parity_base
  seed: 42

model:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  revision: main
  dtype: float16
  attn_implementation: eager        # base always uses eager for output_attentions

cache:
  backend: dynamic                # base run uses full DynamicCache (no eviction)
  backend_package: null
  cache_budget: 0.25              # target compression ratio for top_k derivation only
  window_size: 32
  num_sink_tokens: 4
  local_window_size: 256

data:
  dataset: wikitext-103
  article_id: 0
  prefill_len: 2048
  gen_len: 1024

parity:
  dataset: wikitext-103
  num_articles: 50
  article_index: 0
  min_article_tokens: 4096
  prefill_len: 2048
  gen_len: 1024
  decoding: greedy

window:
  window_size: 32
  num_sink_tokens: 4
  local_window_size: 256

telemetry:
  track_scores: true
  output_dir: outputs
