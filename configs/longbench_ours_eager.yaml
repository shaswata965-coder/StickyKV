# ============================================================================
# LongBench — Ours (eager backend, Kaggle-runnable)
# ============================================================================
# Windowed KV-cache with eager attention score extraction.
# DefensiveKV headline: compression_ratio=0.8 (cache_budget=0.20).
# Use this on Kaggle T4/P100 where flash-attn-2 isn't available.
# Produces: outputs/longbench/ours_eager_compression_0.8/
_base_: base.yaml

run:
  mode: longbench
  seed: 42

model:
  # Llama-3.1-8B-Instruct (128K context) — matches DefensiveKV, which runs the
  # full LongBench context with NO pre-truncation. The original Meta-Llama-3-8B
  # is only 8K and would force middle-truncation (caps passage_retrieval etc.).
  name: meta-llama/Llama-3.1-8B-Instruct
  revision: main
  dtype: float16
  attn_implementation: eager                # MUST match cache.backend_package

cache:
  backend: windowed
  backend_package: eager                    # imports modules.windowed_eager_cache
  cache_budget: 0.20
  window_size: 32
  num_sink_tokens: 4
  local_window_size: 0.25

telemetry:
  track_scores: false

longbench:
  datasets:
    - narrativeqa
    - qasper
    - multifieldqa_en
    - hotpotqa
    - 2wikimqa
    - musique
    - gov_report
    - qmsum
    - multi_news
    - trec
    - triviaqa
    - samsum
    - passage_count
    - passage_retrieval_en
    - lcc
    - repobench-p
  include_chinese: false
  use_e_variants: false
  max_length: null   # no pre-truncation — full context (Llama-3.1 128K fits all LongBench prompts). Matches DefensiveKV.
  output_dir: outputs/longbench/ours_eager_compression_0.8
  seed: 42
  resume: true                              # essential on Kaggle (9-hour limit)
  skip_oom: true                            # record OOM'd examples as pred=null
  aggressive_cache_clear: true              # essential on Kaggle T4
